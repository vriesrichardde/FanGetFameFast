<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" role="img" aria-label="SecurityOperationsCenterOnSteroids logo">
  <defs>
    <linearGradient id="hexFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1629"/>
      <stop offset="100%" style="stop-color:#0D2040"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00C8FF" stroke-width="0.5"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="hexClip">
      <polygon points="250,40 432,145 432,355 250,460 68,355 68,145"/>
    </clipPath>
  </defs>

  <!-- Outer background -->
  <rect width="500" height="500" fill="#080E1A"/>

  <!-- Hexagon gradient fill -->
  <polygon points="250,40 432,145 432,355 250,460 68,355 68,145" fill="url(#hexFill)"/>

  <!-- Circuit grid overlay (clipped to hex) -->
  <rect x="0" y="0" width="500" height="500" fill="url(#grid)" opacity="0.055" clip-path="url(#hexClip)"/>

  <!-- Radar arcs (subtle, SOC monitoring theme) -->
  <circle cx="250" cy="250" r="160" fill="none" stroke="#00C8FF" stroke-width="0.6" opacity="0.1" clip-path="url(#hexClip)"/>
  <circle cx="250" cy="250" r="120" fill="none" stroke="#00C8FF" stroke-width="0.6" opacity="0.08" clip-path="url(#hexClip)"/>

  <!-- Inner decorative hexagon -->
  <polygon points="250,72 406,162 406,338 250,428 94,338 94,162"
           fill="none" stroke="#00C8FF" stroke-width="1" opacity="0.18"/>

  <!-- Outer hexagon border with glow -->
  <polygon points="250,40 432,145 432,355 250,460 68,355 68,145"
           fill="none" stroke="#00C8FF" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Vertex accent dots -->
  <circle cx="250" cy="40"  r="5" fill="#00C8FF" filter="url(#glow)"/>
  <circle cx="432" cy="145" r="5" fill="#00C8FF" filter="url(#glow)"/>
  <circle cx="432" cy="355" r="5" fill="#00C8FF" filter="url(#glow)"/>
  <circle cx="250" cy="460" r="5" fill="#00C8FF" filter="url(#glow)"/>
  <circle cx="68"  cy="355" r="5" fill="#00C8FF" filter="url(#glow)"/>
  <circle cx="68"  cy="145" r="5" fill="#00C8FF" filter="url(#glow)"/>

  <!-- "SOC" primary text -->
  <text x="250" y="232"
        font-family="'Arial Black', 'Impact', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="142"
        fill="#FFFFFF"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="4">SOC</text>

  <!-- "+" superscript (power / on-steroids indicator) -->
  <text x="386" y="176"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="68"
        fill="#FF6B2B"
        text-anchor="middle"
        filter="url(#softglow)">+</text>

  <!-- Top rule above subtitles -->
  <line x1="100" y1="310" x2="400" y2="310" stroke="#00C8FF" stroke-width="0.75" opacity="0.35"/>

  <!-- "SECURITY OPERATIONS CENTER" -->
  <text x="250" y="333"
        font-family="Arial, 'Helvetica Neue', sans-serif"
        font-weight="400"
        font-size="15"
        fill="#00C8FF"
        text-anchor="middle"
        letter-spacing="3.5">SECURITY OPERATIONS CENTER</text>

  <!-- Flanking lines for "ON STEROIDS" -->
  <line x1="83"  y1="358" x2="165" y2="358" stroke="#FF6B2B" stroke-width="0.75" opacity="0.4"/>
  <line x1="335" y1="358" x2="417" y2="358" stroke="#FF6B2B" stroke-width="0.75" opacity="0.4"/>

  <!-- "ON STEROIDS" tagline -->
  <text x="250" y="360"
        font-family="Arial, 'Helvetica Neue', sans-serif"
        font-weight="700"
        font-size="13"
        fill="#FF6B2B"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="5.5">ON STEROIDS</text>

  <!-- Bottom rule -->
  <line x1="100" y1="378" x2="400" y2="378" stroke="#00C8FF" stroke-width="0.75" opacity="0.35"/>
</svg>
