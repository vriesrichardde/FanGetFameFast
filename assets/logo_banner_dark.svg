<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="SecurityOperationsCenterOnSteroids banner logo">
  <defs>
    <linearGradient id="hexFillB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1629"/>
      <stop offset="100%" style="stop-color:#0D2040"/>
    </linearGradient>
    <linearGradient id="bgFadeB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#080E1A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#080E1A;stop-opacity:1"/>
    </linearGradient>
    <pattern id="gridB" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00C8FF" stroke-width="0.4"/>
    </pattern>
    <filter id="glowB" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglowB" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="hexClipB">
      <!-- Hex centered at (150, 150), radius 126 -->
      <polygon points="150,24 259,87 259,213 150,276 41,213 41,87"/>
    </clipPath>
    <!-- Separator line gradient -->
    <linearGradient id="sepGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#00C8FF;stop-opacity:0"/>
      <stop offset="30%"  style="stop-color:#00C8FF;stop-opacity:0.6"/>
      <stop offset="70%"  style="stop-color:#00C8FF;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00C8FF;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="#080E1A"/>

  <!-- Subtle grid across full banner -->
  <rect x="0" y="0" width="1200" height="300" fill="url(#gridB)" opacity="0.03"/>

  <!-- ── LEFT: Hexagon badge ── -->

  <!-- Hex fill -->
  <polygon points="150,24 259,87 259,213 150,276 41,213 41,87" fill="url(#hexFillB)"/>

  <!-- Circuit grid clipped to hex -->
  <rect x="0" y="0" width="300" height="300" fill="url(#gridB)" opacity="0.07" clip-path="url(#hexClipB)"/>

  <!-- Radar arcs inside hex -->
  <circle cx="150" cy="150" r="96"  fill="none" stroke="#00C8FF" stroke-width="0.5" opacity="0.1" clip-path="url(#hexClipB)"/>
  <circle cx="150" cy="150" r="72"  fill="none" stroke="#00C8FF" stroke-width="0.5" opacity="0.08" clip-path="url(#hexClipB)"/>

  <!-- Inner decorative hex -->
  <polygon points="150,44 241,96 241,204 150,256 59,204 59,96"
           fill="none" stroke="#00C8FF" stroke-width="0.75" opacity="0.18"/>

  <!-- Outer hex border -->
  <polygon points="150,24 259,87 259,213 150,276 41,213 41,87"
           fill="none" stroke="#00C8FF" stroke-width="2" filter="url(#glowB)"/>

  <!-- Vertex dots -->
  <circle cx="150" cy="24"  r="4" fill="#00C8FF" filter="url(#glowB)"/>
  <circle cx="259" cy="87"  r="4" fill="#00C8FF" filter="url(#glowB)"/>
  <circle cx="259" cy="213" r="4" fill="#00C8FF" filter="url(#glowB)"/>
  <circle cx="150" cy="276" r="4" fill="#00C8FF" filter="url(#glowB)"/>
  <circle cx="41"  cy="213" r="4" fill="#00C8FF" filter="url(#glowB)"/>
  <circle cx="41"  cy="87"  r="4" fill="#00C8FF" filter="url(#glowB)"/>

  <!-- "SOC" text inside hex -->
  <text x="150" y="152"
        font-family="'Arial Black', 'Impact', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="86"
        fill="#FFFFFF"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="2">SOC</text>

  <!-- "+" superscript -->
  <text x="233" y="110"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="44"
        fill="#FF6B2B"
        text-anchor="middle"
        filter="url(#softglowB)">+</text>

  <!-- ── SEPARATOR ── -->
  <line x1="310" y1="40" x2="310" y2="260" stroke="url(#sepGrad)" stroke-width="1"/>

  <!-- ── RIGHT: Project name & tagline ── -->

  <!-- "Security Operations Center" — stacked words for visual weight -->
  <text x="360" y="95"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="52"
        fill="#FFFFFF"
        text-anchor="start"
        letter-spacing="1">Security</text>

  <text x="360" y="155"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="52"
        fill="#FFFFFF"
        text-anchor="start"
        letter-spacing="1">Operations</text>

  <text x="360" y="215"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="52"
        fill="#FFFFFF"
        text-anchor="start"
        letter-spacing="1">Center</text>

  <!-- "On Steroids" accent -->
  <text x="368" y="253"
        font-family="Arial, 'Helvetica Neue', sans-serif"
        font-weight="700"
        font-size="19"
        fill="#FF6B2B"
        text-anchor="start"
        letter-spacing="5">ON STEROIDS</text>

  <!-- Decorative accent line under "On Steroids" -->
  <line x1="360" y1="262" x2="636" y2="262" stroke="#FF6B2B" stroke-width="1" opacity="0.5"/>

  <!-- Right-side accent: subtle tag -->
  <text x="1180" y="280"
        font-family="Arial, 'Helvetica Neue', sans-serif"
        font-weight="400"
        font-size="11"
        fill="#00C8FF"
        text-anchor="end"
        opacity="0.45"
        letter-spacing="2">DFIR · SOC · CTI</text>
</svg>
